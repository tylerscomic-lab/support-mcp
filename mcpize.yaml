version: 1
name: support-mcp
description: Customer support AI MCP — FAQ generation, support responses, knowledge base, ticket analysis
runtime: typescript
entry: server.js
build:
  install: npm install
startCommand:
  type: http
  command: node server.js
  port: 8080
  healthCheck: /health
  mcpPath: /mcp
secrets:
  - name: GROQ_API_KEY
    required: true
